<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="refresh" content="0; url=https://d1srupt.store/collection/mindfolk/" />
    <title>Redirecting…</title>
    <link rel="canonical" href="https://d1srupt.store/collection/mindfolk/" />
    <meta name="robots" content="noindex" />
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0b0f;
        color: #fff;
      }
      .card {
        width: min(560px, calc(100vw - 2rem));
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 1.25rem 1.25rem;
      }
      a {
        color: #ffc107;
      }
      .muted {
        color: rgba(255, 255, 255, 0.72);
        font-size: 0.95rem;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <div class="card" role="status" aria-live="polite">
      <div style="font-weight: 800; letter-spacing: 0.02em">Opening Mindfolk merch…</div>
      <p class="muted" style="margin: 0.65rem 0 0">
        If you’re not redirected automatically, open
        <a href="https://d1srupt.store/collection/mindfolk/">d1srupt.store/collection/mindfolk</a>.
      </p>
    </div>
    <script>
      // JS redirect for browsers that ignore meta refresh.
      window.location.replace('https://d1srupt.store/collection/mindfolk/');
    </script>
  </body>
</html>
